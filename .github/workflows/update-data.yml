name: Update cinema data

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
        run: python scripts/build_cinema_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/cdc/cinemaData.json src/cdc/wheelData.json public/posters public/backgrounds
          if git diff --cached --quiet; then
            echo "Nada para commitar."
          else
            git commit -m "chore: update cinema data (automated)"
            git push
          fi
